# See GitHub's documentation for more information on this file:
# https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/configuration-options-for-dependency-updates
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    allow:
      - dependency-type: "direct"
    commit-message:
      prefix: "chore(deps)"
    groups:
      terraform-plugin-minor-patch:
        patterns:
          - "github.com/hashicorp/terraform-plugin-*"
        update-types:
          - "minor"
          - "patch"
      gomod-minor-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "github.com/hashicorp/terraform-plugin-*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
